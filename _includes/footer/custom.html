<style>
html[data-lang="en"] .lang-zh { display: none !important; }
html[data-lang="zh"] .lang-en { display: none !important; }
.lang-toggle { cursor: pointer; font-weight: 600; letter-spacing: 0; }
.project-logo { width: 56px; height: 56px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(128,128,128,.25); }
.project-hero { border: 1px solid rgba(128,128,128,.22); border-radius: 8px; overflow: hidden; margin: 1rem 0; }
.project-hero img { display: block; width: 100%; height: auto; }
.cv-frame { width: 100%; min-height: 760px; border: 1px solid rgba(128,128,128,.25); border-radius: 8px; }
.cv-actions { display: flex; flex-wrap: wrap; gap: .5rem; margin: .5rem 0 .75rem; }
.cv-actions a { margin-right: 0; }
.cv-note { color: #667085; font-size: .9rem; }
.profile-brief { margin: .45rem 0 1.35rem; padding: .85rem 0 1rem; border-top: 1px solid rgba(128,128,128,.18); border-bottom: 1px solid rgba(128,128,128,.18); color: #3f454b; font-size: 1.02rem; line-height: 1.55; }
.profile-metrics { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: .65rem; margin-top: .85rem; }
.profile-metrics span { display: block; padding: .62rem .7rem; border: 1px solid rgba(128,128,128,.18); border-radius: 8px; background: rgba(128,128,128,.035); }
.profile-metrics strong { display: block; color: #1f2933; font-size: .95rem; }
.profile-metrics small { display: block; margin-top: .12rem; color: #667085; font-size: .78rem; }
.section-jump { display: flex; flex-wrap: wrap; gap: .45rem; margin: 1rem 0 1.25rem; }
.section-jump a { padding: .38rem .65rem; border: 1px solid rgba(128,128,128,.22); border-radius: 999px; color: #3f454b; font-size: .82rem; font-weight: 600; text-decoration: none; }
.section-jump a:hover { background: #f6f8fa; color: #1f2933; text-decoration: none; }
.research-tags { display: flex; flex-wrap: wrap; gap: .35rem; margin: -.2rem 0 .55rem; }
.research-tags span { display: inline-flex; align-items: center; padding: .2rem .48rem; border: 1px solid rgba(64,83,107,.18); border-radius: 999px; background: rgba(64,83,107,.045); color: #536273; font-size: .72rem; font-weight: 600; line-height: 1.2; }
.project-actions { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: 1rem; }
.project-actions a { margin-right: 0; }
.archive__item-excerpt p { margin-bottom: .35rem; }
.archive__item-teaser { margin-bottom: .75rem; max-width: 420px; border: 1px solid rgba(128,128,128,.22); border-radius: 8px; overflow: hidden; background: rgba(128,128,128,.06); }
.archive__item-teaser img { display: block; width: 100%; aspect-ratio: 16 / 9; object-fit: cover; }
.project-preview { margin: 0 0 1.2rem; border: 1px solid rgba(128,128,128,.22); border-radius: 8px; overflow: hidden; background: rgba(128,128,128,.06); }
.project-preview img { display: block; width: 100%; aspect-ratio: 16 / 9; object-fit: cover; }
.research-figure { margin: 1.25rem 0; border: 1px solid rgba(128,128,128,.22); border-radius: 8px; overflow: hidden; background: rgba(128,128,128,.045); }
.research-figure img { display: block; width: 100%; height: auto; }
.research-figure figcaption { padding: .6rem .75rem; font-size: .82em; line-height: 1.45; color: #666; border-top: 1px solid rgba(128,128,128,.16); }
.page__share { margin-top: 2rem; padding-top: 1rem; }
.page__share-title { margin-bottom: .65rem; letter-spacing: .04em; }
.share-actions { display: flex; flex-wrap: wrap; gap: .45rem; align-items: center; }
.share-btn { display: inline-flex; align-items: center; gap: .38rem; min-height: 2.1rem; padding: .42rem .7rem; border: 1px solid rgba(128,128,128,.24); border-radius: 999px; background: #fff; color: #3f454b; font-size: .82rem; font-weight: 600; line-height: 1; text-decoration: none !important; cursor: pointer; transition: background .18s ease, border-color .18s ease, color .18s ease, transform .18s ease; }
.share-btn:hover { transform: translateY(-1px); border-color: rgba(70,80,90,.38); background: #f6f8fa; color: #1f2933; }
.share-btn i { font-size: .95rem; }
.share-btn--wechat i { color: #17b45b; }
.share-btn--qq i { color: #2f80ed; }
.share-btn--weibo i { color: #df2029; }
.share-btn--facebook i { color: #1877f2; }
.share-btn--x i { color: #111; }
.share-btn--native i { color: #475467; }
.share-btn--copy i { color: #667085; }
.wechat-share-panel { margin-top: .75rem; }
.wechat-share-panel__inner { display: inline-flex; align-items: center; gap: .85rem; padding: .75rem .85rem; border: 1px solid rgba(128,128,128,.22); border-radius: 8px; background: rgba(128,128,128,.045); }
.wechat-share-panel img { width: 112px; height: 112px; border-radius: 4px; }
.wechat-share-panel p { margin: 0; color: #667085; font-size: .85rem; line-height: 1.45; }
@media (max-width: 520px) { .share-actions { gap: .38rem; } .share-btn { min-height: 2rem; padding: .4rem .58rem; font-size: .78rem; } .wechat-share-panel__inner { display: flex; width: 100%; } }
@media (max-width: 640px) { .profile-metrics { grid-template-columns: 1fr; } }
.page__footer { position: static; }
.page__footer footer { max-width: 820px; }
.page__footer-follow { margin-bottom: .15rem; }
</style>
<script>
(function () {
  var navLabels = {
    '/': ['About', '\u5173\u4e8e'],
    '/publications/': ['Research', '\u79d1\u7814'],
    '/portfolio/': ['Projects', '\u9879\u76ee'],
    '/honors/': ['Honors', '\u8363\u8a89'],
    '/cv/': ['CV', '\u7b80\u5386']
  };

  function apply(lang) {
    document.documentElement.setAttribute('data-lang', lang);
    localStorage.setItem('site-lang', lang);
    document.querySelectorAll('[data-lang-toggle-label]').forEach(function (el) {
      el.textContent = lang === 'zh' ? 'EN' : '\u4e2d\u6587';
    });
    document.querySelectorAll('.masthead__menu-item:not(.masthead__menu-item--lg) > a[href]:not([data-lang-toggle])').forEach(function (a) {
      var path = new URL(a.getAttribute('href'), window.location.origin).pathname;
      if (navLabels[path]) a.textContent = navLabels[path][lang === 'zh' ? 1 : 0];
    });
    document.querySelectorAll('[data-lang-en][data-lang-zh]').forEach(function (el) {
      el.textContent = el.getAttribute(lang === 'zh' ? 'data-lang-zh' : 'data-lang-en');
    });
  }

  function updateExternalLinks() {
    document.querySelectorAll('a[href]').forEach(function (a) {
      var href = a.getAttribute('href');
      if (!href || href.charAt(0) === '#' || href.indexOf('mailto:') === 0 || href.indexOf('javascript:') === 0) return;
      var url = new URL(href, window.location.href);
      if (url.origin !== window.location.origin) {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
      } else {
        a.removeAttribute('target');
        a.removeAttribute('rel');
      }
    });
  }

  function setupShareTools() {
    document.querySelectorAll('.page__share').forEach(function (share) {
      var url = share.getAttribute('data-share-url') || window.location.href;
      var wechatButton = share.querySelector('[data-wechat-share]');
      var wechatPanel = share.querySelector('[data-wechat-panel]');
      var nativeButton = share.querySelector('[data-native-share]');
      var copyButton = share.querySelector('[data-copy-share]');
      var copyLabel = share.querySelector('[data-copy-label]');
      var title = share.getAttribute('data-share-title') || document.title;

      if (nativeButton && navigator.share) {
        nativeButton.hidden = false;
        nativeButton.addEventListener('click', function () {
          navigator.share({ title: title, url: url }).catch(function () {});
        });
      }

      if (wechatButton && wechatPanel) {
        wechatButton.addEventListener('click', function () {
          var isHidden = wechatPanel.hasAttribute('hidden');
          if (isHidden) {
            wechatPanel.removeAttribute('hidden');
            wechatButton.setAttribute('aria-expanded', 'true');
          } else {
            wechatPanel.setAttribute('hidden', '');
            wechatButton.setAttribute('aria-expanded', 'false');
          }
        });
      }

      if (copyButton && copyLabel) {
        copyButton.addEventListener('click', function () {
          function markCopied() {
            copyLabel.textContent = document.documentElement.getAttribute('data-lang') === 'zh' ? '\u5df2\u590d\u5236' : 'Copied';
            window.setTimeout(function () {
              copyLabel.textContent = document.documentElement.getAttribute('data-lang') === 'zh' ? '\u590d\u5236\u94fe\u63a5' : 'Copy link';
            }, 1600);
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(markCopied);
          } else {
            window.prompt('Copy this link', url);
            markCopied();
          }
        });
      }
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    apply(localStorage.getItem('site-lang') || 'en');
    document.querySelectorAll('[data-lang-toggle]').forEach(function (el) {
      el.addEventListener('click', function (event) {
        event.preventDefault();
        apply(document.documentElement.getAttribute('data-lang') === 'zh' ? 'en' : 'zh');
      });
    });
    updateExternalLinks();
    setupShareTools();
  });
})();
</script>
