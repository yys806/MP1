locale                   : "en-US"
site_theme               : "default"
title                    : "Yaoshen Yu"
title_separator          : "-"
name                     : &name "Yaoshen Yu"
description              : &description "Academic portfolio of Yaoshen Yu, an AI undergraduate at Tongji University working on mixed-autonomy traffic, VLM evaluation, world models, and product-oriented software."
og_description           : "Academic portfolio of Yaoshen Yu, featuring research, projects, honors, and selected software products."
og_image                 : "profile.jpg"
url                      : "https://shen-intro.de5.net"
baseurl                  : ""
repository               : "yys806/MP1"

author:
  avatar           : "profile.jpg"
  name             : "Yaoshen Yu"
  bio              : "AI undergraduate at Tongji University working on mixed-autonomy traffic, VLM evaluation, world models, and product-oriented software."
  location         : "Shanghai / Yunnan, China"
  employer         : "Tongji University"
  email            : "2352396@tongji.edu.cn"
  github           : "yys806"
  blog             : "https://yys806.github.io/"

publication_category:
  manuscripts:
    title: "Research Projects"
  conferences:
    title: "Conference Papers"
  books:
    title: "Software Copyrights"

teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
comments:
  provider               : false
atom_feed:
  hide                   : false

include:
  - .htaccess
  - _pages
  - files
exclude:
  - .github
  - node_modules
  - vendor
  - README
  - tmp
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  toc_levels: 1..6

sass:
  sass_dir: _sass
  style: compressed

collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: false
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: false
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comments: false

permalink: /:categories/:title/
timezone: Asia/Shanghai

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
